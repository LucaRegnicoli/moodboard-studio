<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moodboard Studio</title>
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    /* === TOKENS === */
    :root {
      --bg: #1a1a18;
      --ink: #faf9f6;
      --rule: #333330;
      --accent: #c8b89a;
      --placeholder-bg: #2a2a28;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --sidebar-width: 260px;
      --topbar-height: 56px;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.4;
    }

    /* === TOPBAR === */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-height);
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 200;
    }
    .topbar-logo {
      font-family: var(--serif);
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 0.04em;
      color: var(--ink);
    }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .topbar-docs {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      margin-right: 4px;
    }
    .topbar-docs:hover { color: var(--ink); }

    /* === APP SHELL === */
    #app {
      display: flex;
      margin-top: var(--topbar-height);
      height: calc(100vh - var(--topbar-height));
    }

    /* === SIDEBAR === */
    #sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      height: 100%;
      overflow-y: auto;
      border-right: 1px solid var(--rule);
      background: var(--bg);
      padding: 20px 16px 48px;
    }
    .sidebar-section { margin-bottom: 4px; }
    .sidebar-label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    hr.sidebar-rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 16px 0;
    }

    /* === DROP ZONE === */
    #drop-zone {
      border: 1px dashed var(--rule);
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    #drop-zone.drag-over { border-color: var(--accent); background: var(--placeholder-bg); }
    #drop-zone p { font-size: 11px; color: var(--accent); line-height: 1.7; }
    .link-label { text-decoration: underline; cursor: pointer; color: var(--ink); }
    #upload-status { font-size: 10px; color: var(--accent); margin-bottom: 6px; min-height: 14px; }
    #upload-status.error { color: #a33; }
    .header-img-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .header-img-row .sidebar-label { margin-bottom: 0; flex-shrink: 0; }

    /* === INPUTS === */
    .sidebar-input {
      width: 100%;
      border: 1px solid var(--rule);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 12px;
      padding: 7px 9px;
      margin-bottom: 6px;
      outline: none;
    }
    .sidebar-input:focus { border-color: var(--accent); }

    /* === BUTTONS === */
    .btn {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 7px 14px;
      border: 1px solid var(--ink);
      background: var(--bg);
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
    }
    .btn:hover:not(:disabled) { background: var(--ink); color: var(--bg); }
    .btn-primary { background: var(--ink); color: var(--bg); }
    .btn-primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-sm { font-size: 10px; padding: 4px 10px; }

    /* === LAYOUT OPTIONS === */
    .layout-options { display: flex; gap: 6px; }
    .layout-option {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; cursor: pointer; font-size: 10px; color: var(--accent); letter-spacing: 0.06em;
    }
    .layout-option input[type="radio"] { display: none; }
    .layout-icon {
      width: 52px; height: 38px; border: 1px solid var(--rule);
      padding: 5px; color: var(--rule); transition: border-color 0.12s, color 0.12s;
    }
    .layout-icon svg { width: 100%; height: 100%; display: block; }
    .layout-option input:checked ~ .layout-icon { border-color: var(--ink); color: var(--ink); }
    .layout-option input:checked ~ span { color: var(--ink); }

    /* === THEME SWATCHES === */
    .theme-swatches { display: flex; gap: 8px; margin-bottom: 4px; }
    .theme-swatch {
      width: 28px; height: 28px; border: 1px solid var(--rule);
      cursor: pointer; padding: 0; transition: box-shadow 0.12s;
    }
    .theme-swatch.active { box-shadow: 0 0 0 2px var(--ink); }
    .theme-labels, .font-labels { display: flex; gap: 0; margin-bottom: 10px; }
    .theme-labels span { font-size: 9px; color: var(--accent); letter-spacing: 0.05em; width: 36px; text-align: center; }
    .font-labels span { font-size: 9px; color: var(--accent); letter-spacing: 0.05em; width: 60px; text-align: center; }

    /* === FONT OPTIONS === */
    .font-options { display: flex; gap: 8px; margin-bottom: 4px; }
    .font-option {
      width: 52px; height: 34px; border: 1px solid var(--rule);
      background: var(--bg); color: var(--ink); cursor: pointer;
      font-size: 17px; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.12s; padding: 0;
    }
    .font-option.active { border-color: var(--ink); }

    /* === FILTERS === */
    .filter-legend {
      display: block; font-size: 9px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 7px;
    }
    .filter-check {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 5px; font-size: 11px; cursor: pointer; user-select: none;
    }
    .filter-check input[type="checkbox"] { accent-color: var(--ink); cursor: pointer; }
    #filter-tiers { margin-top: 14px; }

    /* === CANVAS AREA === */
    #canvas-area { flex: 1; overflow-y: auto; padding: 40px; background: #edeae2; }

    /* === BOARD === */
    #board {
      background: var(--bg);
      max-width: 860px;
      margin: 0 auto;
      padding: 0;
      border: 1px solid var(--rule);
      color: var(--ink);
    }

    /* === COVER === */
    .board-cover {
      background: #1a1a18;
      color: #f0ebe0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 64px;
      min-height: 480px;
    }
    .board-cover-image {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }
    .board-cover-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cover-eyebrow {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }
    .cover-title {
      font-family: var(--serif);
      font-size: 52px;
      font-weight: normal;
      line-height: 1.1;
      letter-spacing: 0.02em;
      color: #f0ebe0;
      margin-bottom: 28px;
    }
    .cover-divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 28px;
    }
    .cover-meta {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #888;
      line-height: 2.4;
    }

    /* === TABLE OF CONTENTS === */
    .board-toc {
      padding: 48px 64px 56px;
      border-bottom: 1px solid var(--rule);
    }
    .toc-heading {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: normal;
      color: var(--ink);
      margin-bottom: 28px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--rule);
    }
    .toc-table { width: 100%; border-collapse: collapse; }
    .toc-table th {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: normal;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0 0 8px;
      border-bottom: 1px solid var(--rule);
      text-align: left;
    }
    .toc-table th:last-child { text-align: right; }
    .toc-row td {
      font-family: var(--serif);
      font-size: 15px;
      color: var(--ink);
      padding: 10px 0;
      border-bottom: 1px solid var(--rule);
      letter-spacing: 0.02em;
    }
    .toc-row:last-child td { border-bottom: none; }
    .toc-count {
      font-family: var(--sans) !important;
      font-size: 11px !important;
      color: var(--accent) !important;
      text-align: right;
      letter-spacing: 0.08em;
    }

    /* === BOARD BODY === */
    .board-body { padding: 0 64px; }

    /* === CATEGORY HEADING === */
    .category-section { padding-top: 56px; margin-bottom: 48px; }
    .category-heading { margin-bottom: 24px; }
    .category-heading h2 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: normal;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .category-count {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
    .category-rule { border: none; border-top: 1px solid var(--rule); margin-bottom: 24px; }

    /* === CARD GRID === */
    .card-grid { display: grid; gap: 16px; }
    .card-grid.layout-grid2 { grid-template-columns: repeat(2, 1fr); }
    .card-grid.layout-grid3 { grid-template-columns: repeat(3, 1fr); }
    .card-grid.layout-editorial { grid-template-columns: repeat(6, 1fr); }

    /* Editorial: narrow (2), wide (4), full (6) */
    .card-grid.layout-editorial .product-card:nth-child(3n-2) { grid-column: span 2; }
    .card-grid.layout-editorial .product-card:nth-child(3n-1) { grid-column: span 4; }
    .card-grid.layout-editorial .product-card:nth-child(3n) {
      grid-column: span 6;
      display: grid;
      grid-template-columns: 55% 45%;
    }
    .card-grid.layout-editorial .product-card:nth-child(3n) .card-image-wrap {
      padding-bottom: 0;
      min-height: 280px;
    }
    .card-grid.layout-editorial .product-card:nth-child(3n) .card-image-wrap img,
    .card-grid.layout-editorial .product-card:nth-child(3n) .card-image-wrap .image-placeholder {
      height: 100%;
    }
    .card-grid.layout-editorial .product-card:nth-child(3n) .card-title-block {
      border-left: 1px solid var(--rule);
      border-top: none;
    }
    .card-grid.layout-editorial .product-card:nth-child(3n) .spec-sheet {
      border-left: 1px solid var(--rule);
    }

    /* === PRODUCT CARD === */
    .product-card {
      border: 1px solid var(--rule);
      background: var(--bg);
      overflow: hidden;
      break-inside: avoid;
    }

    /* Padding-bottom trick for 4:3 — html2canvas compatible */
    .card-image-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 75%;
      overflow: hidden;
      background: var(--placeholder-bg);
    }
    .card-image-wrap img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .image-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--accent);
      font-family: var(--sans);
      background: var(--placeholder-bg);
    }

    /* Title block */
    .card-title-block {
      padding: 12px 14px 10px;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .card-name {
      font-family: var(--serif);
      font-size: 14px;
      font-weight: normal;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .card-designer {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Spec sheet */
    .spec-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      border-bottom: 1px solid var(--rule);
    }
    .spec-row:last-child { border-bottom: none; }
    .spec-label {
      font-family: var(--sans);
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 7px 8px 7px 14px;
      border-right: 1px solid var(--rule);
      line-height: 1.4;
    }
    .spec-value {
      font-family: var(--sans);
      font-size: 10px;
      color: var(--ink);
      opacity: 0.7;
      padding: 7px 14px;
      line-height: 1.4;
      word-break: break-word;
    }
    .spec-link {
      font-size: 9px;
      color: var(--accent);
      text-decoration: none;
      opacity: 1;
    }
    .spec-link:hover { text-decoration: underline; }

    /* === BOARD FOOTER === */
    .board-footer {
      margin: 0 64px;
      padding: 16px 0 56px;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .footer-brand {
      font-family: var(--serif);
      font-size: 12px;
      white-space: nowrap;
      color: var(--ink);
    }
    .footer-rule { flex: 1; border: none; border-top: 1px solid var(--rule); }
    .footer-date {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.5;
      white-space: nowrap;
    }

    /* === EMPTY STATE === */
    #empty-state { padding: 100px 64px; text-align: center; }
    .empty-heading {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: normal;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .empty-body { font-size: 13px; color: var(--accent); line-height: 1.7; }

    /* === EXPORT OVERLAY === */
    #export-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 24, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .export-spinner {
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--ink);
      border: 1px solid var(--rule);
      padding: 20px 36px;
      background: var(--bg);
    }
  </style>
</head>
<body>

<header id="topbar">
  <span class="topbar-logo">Moodboard Studio</span>
  <div class="topbar-actions">
    <a href="README.md" target="_blank" rel="noopener noreferrer" class="topbar-docs">Docs</a>
    <button id="btn-export-png" class="btn" disabled>Export PNG</button>
    <button id="btn-export-pdf" class="btn btn-primary" disabled>Export PDF</button>
  </div>
</header>

<div id="app">
  <aside id="sidebar">

    <section class="sidebar-section">
      <span class="sidebar-label">Data</span>
      <div id="drop-zone">
        <p>Drop JSON here<br>or <label for="json-input" class="link-label">browse file</label></p>
        <input type="file" id="json-input" accept=".json" style="display:none">
      </div>
      <div id="upload-status"></div>
      <div class="header-img-row">
        <span class="sidebar-label">Header image</span>
        <label for="header-img-input" class="btn btn-sm">Upload</label>
        <input type="file" id="header-img-input" accept="image/*" style="display:none">
        <button id="btn-clear-header" class="btn btn-sm" style="display:none">Remove</button>
      </div>
    </section>

    <hr class="sidebar-rule">

    <section class="sidebar-section">
      <span class="sidebar-label">Board info</span>
      <input type="text" id="input-title" class="sidebar-input" placeholder="Board title" value="Furniture Selection">
      <input type="text" id="input-subtitle" class="sidebar-input" placeholder="Subtitle / eyebrow">
      <input type="text" id="input-client" class="sidebar-input" placeholder="Client name">
      <input type="text" id="input-date" class="sidebar-input" placeholder="Date">
    </section>

    <hr class="sidebar-rule">

    <section class="sidebar-section">
      <span class="sidebar-label">Layout</span>
      <div class="layout-options">
        <label class="layout-option">
          <input type="radio" name="layout" value="grid2">
          <div class="layout-icon">
            <svg viewBox="0 0 40 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="17" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="22" y="1" width="17" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="1" y="17" width="17" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="22" y="17" width="17" height="12" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <span>2-col</span>
        </label>
        <label class="layout-option">
          <input type="radio" name="layout" value="grid3" checked>
          <div class="layout-icon">
            <svg viewBox="0 0 40 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="10" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="15" y="1" width="10" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="29" y="1" width="10" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="1" y="17" width="10" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="15" y="17" width="10" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="29" y="17" width="10" height="12" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <span>3-col</span>
        </label>
        <label class="layout-option">
          <input type="radio" name="layout" value="editorial">
          <div class="layout-icon">
            <svg viewBox="0 0 40 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="13" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="18" y="1" width="21" height="12" stroke="currentColor" stroke-width="1.5"/>
              <rect x="1" y="17" width="38" height="12" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <span>Editorial</span>
        </label>
      </div>
    </section>

    <hr class="sidebar-rule">

    <section class="sidebar-section">
      <span class="sidebar-label">Colour theme</span>
      <div class="theme-swatches" id="theme-swatches">
        <button class="theme-swatch" data-theme="linen" title="Linen" style="background:#faf9f6;"></button>
        <button class="theme-swatch" data-theme="slate" title="Slate" style="background:#f4f4f2;"></button>
        <button class="theme-swatch" data-theme="chalk" title="Chalk" style="background:#ffffff; border-color:#ccc;"></button>
        <button class="theme-swatch active" data-theme="noir" title="Noir" style="background:#1a1a18;"></button>
      </div>
      <div class="theme-labels">
        <span>Linen</span><span>Slate</span><span>Chalk</span><span>Noir</span>
      </div>

      <span class="sidebar-label" style="display:block; margin-top:4px">Font pairing</span>
      <div class="font-options" id="font-options">
        <button class="font-option active" data-fonts="classic" style="font-family:Georgia,serif">Aa</button>
        <button class="font-option" data-fonts="modern" style="font-family:'Bodoni MT',Didot,serif">Aa</button>
        <button class="font-option" data-fonts="slab" style="font-family:Rockwell,'Courier New',serif">Aa</button>
      </div>
      <div class="font-labels">
        <span>Classic</span><span>Modern</span><span>Slab</span>
      </div>
    </section>

    <hr class="sidebar-rule">

    <section class="sidebar-section" id="section-filters" style="display:none">
      <div id="filter-categories"></div>
      <div id="filter-tiers"></div>
    </section>

  </aside>

  <main id="canvas-area">
    <div id="board"></div>
  </main>
</div>

<div id="export-overlay" style="display:none">
  <div class="export-spinner">Generating export…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
const state = {
  products: [],
  headerImageSrc: null,
  meta: {
    title: 'Furniture Selection',
    subtitle: '',
    client: '',
    date: new Date().toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' })
  },
  layout: 'grid3',
  theme: 'noir',
  fonts: 'classic',
  visibleCategories: new Set(),
  visibleTiers: new Set()
};

// ============================================================
// THEME & FONT DEFINITIONS
// ============================================================
const THEMES = {
  linen: { bg: '#faf9f6', ink: '#1a1a18', rule: '#e2e0d8', accent: '#c8b89a', placeholder: '#f2f0eb' },
  slate: { bg: '#f4f4f2', ink: '#1c2b3a', rule: '#d4d8dc', accent: '#7a9bb5', placeholder: '#eaecee' },
  chalk: { bg: '#ffffff',  ink: '#111111', rule: '#e0e0e0', accent: '#999999', placeholder: '#f5f5f5' },
  noir:  { bg: '#1a1a18', ink: '#faf9f6', rule: '#333330', accent: '#c8b89a', placeholder: '#2a2a28' }
};

const FONTS = {
  classic: { serif: "Georgia, 'Times New Roman', serif",             sans: "'Helvetica Neue', Helvetica, Arial, sans-serif" },
  modern:  { serif: "'Bodoni MT', Didot, 'Times New Roman', serif",  sans: "'Century Gothic', Futura, Arial, sans-serif" },
  slab:    { serif: "Rockwell, 'Rockwell Nova', 'Courier New', serif", sans: "'Gill Sans', 'Gill Sans MT', Calibri, sans-serif" }
};

// ============================================================
// INIT
// ============================================================
function init() {
  document.getElementById('input-date').value = state.meta.date;

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0]; if (f) loadJSONFile(f);
  });
  dz.addEventListener('click', e => { if (e.target.tagName !== 'LABEL') document.getElementById('json-input').click(); });
  document.getElementById('json-input').addEventListener('change', e => { if (e.target.files[0]) loadJSONFile(e.target.files[0]); });

  document.getElementById('header-img-input').addEventListener('change', e => { if (e.target.files[0]) handleHeaderImageUpload(e.target.files[0]); });
  document.getElementById('btn-clear-header').addEventListener('click', () => {
    state.headerImageSrc = null;
    document.getElementById('btn-clear-header').style.display = 'none';
    document.getElementById('header-img-input').value = '';
    renderBoard();
  });

  bindMetaInputs();
  bindLayoutControls();
  bindThemeControls();
  bindFontControls();

  document.getElementById('btn-export-png').addEventListener('click', exportPNG);
  document.getElementById('btn-export-pdf').addEventListener('click', exportPDF);

  renderBoard();
}

// ============================================================
// UPLOAD
// ============================================================
function loadJSONFile(file) {
  const status = document.getElementById('upload-status');
  status.textContent = 'Reading…'; status.className = '';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      parseProducts(e.target.result);
      status.textContent = state.products.length + ' products loaded';
      populateFilters();
      renderBoard();
      setExportEnabled(true);
    } catch (err) { status.textContent = 'Error: ' + err.message; status.className = 'error'; }
  };
  reader.onerror = () => { status.textContent = 'Failed to read file'; status.className = 'error'; };
  reader.readAsText(file);
}

function parseProducts(jsonText) {
  const data = JSON.parse(jsonText);
  if (!Array.isArray(data)) throw new Error('JSON must be an array');
  state.products = data;
  state.visibleCategories = new Set(getUnique(data, 'category'));
  state.visibleTiers = new Set(getUnique(data, 'tier'));
}

function handleHeaderImageUpload(file) {
  const reader = new FileReader();
  reader.onload = e => {
    state.headerImageSrc = e.target.result;
    document.getElementById('btn-clear-header').style.display = '';
    renderBoard();
  };
  reader.readAsDataURL(file);
}

// ============================================================
// SIDEBAR BINDINGS
// ============================================================
function bindMetaInputs() {
  [
    { id: 'input-title',    key: 'title' },
    { id: 'input-subtitle', key: 'subtitle' },
    { id: 'input-client',   key: 'client' },
    { id: 'input-date',     key: 'date' }
  ].forEach(({ id, key }) => {
    document.getElementById(id).addEventListener('input', e => {
      state.meta[key] = e.target.value;
      renderBoardMeta();
    });
  });
}

function bindLayoutControls() {
  document.querySelectorAll('input[name="layout"]').forEach(radio => {
    radio.addEventListener('change', e => { state.layout = e.target.value; applyLayout(); });
  });
}

function bindThemeControls() {
  document.querySelectorAll('.theme-swatch').forEach(btn => {
    btn.addEventListener('click', () => {
      state.theme = btn.dataset.theme;
      document.querySelectorAll('.theme-swatch').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyTheme(state.theme);
    });
  });
}

function bindFontControls() {
  document.querySelectorAll('.font-option').forEach(btn => {
    btn.addEventListener('click', () => {
      state.fonts = btn.dataset.fonts;
      document.querySelectorAll('.font-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFonts(state.fonts);
    });
  });
}

function applyTheme(name) {
  const t = THEMES[name], r = document.documentElement.style;
  r.setProperty('--bg', t.bg); r.setProperty('--ink', t.ink);
  r.setProperty('--rule', t.rule); r.setProperty('--accent', t.accent);
  r.setProperty('--placeholder-bg', t.placeholder);
}

function applyFonts(name) {
  const f = FONTS[name];
  document.documentElement.style.setProperty('--serif', f.serif);
  document.documentElement.style.setProperty('--sans', f.sans);
}

function populateFilters() {
  const categories = getUnique(state.products, 'category');
  const tiers = getUnique(state.products, 'tier');
  document.getElementById('section-filters').style.display = '';

  const catEl = document.getElementById('filter-categories');
  catEl.innerHTML = '';
  const catLegend = document.createElement('span');
  catLegend.className = 'filter-legend'; catLegend.textContent = 'Categories';
  catEl.appendChild(catLegend);
  categories.forEach(cat => catEl.appendChild(makeCheckbox(cat, true, checked => {
    checked ? state.visibleCategories.add(cat) : state.visibleCategories.delete(cat);
    renderBoard();
  })));

  const tierEl = document.getElementById('filter-tiers');
  tierEl.innerHTML = '';
  const tierLegend = document.createElement('span');
  tierLegend.className = 'filter-legend'; tierLegend.textContent = 'Tiers';
  tierEl.appendChild(tierLegend);
  tiers.forEach(tier => tierEl.appendChild(makeCheckbox(tier || '(no tier)', true, checked => {
    checked ? state.visibleTiers.add(tier) : state.visibleTiers.delete(tier);
    renderBoard();
  })));
}

function makeCheckbox(label, initialChecked, onChange) {
  const el = document.createElement('label');
  el.className = 'filter-check';
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.checked = initialChecked;
  cb.addEventListener('change', () => onChange(cb.checked));
  el.appendChild(cb);
  el.appendChild(document.createTextNode(label));
  return el;
}

// ============================================================
// RENDER PIPELINE
// ============================================================
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  if (state.products.length === 0) {
    board.appendChild(renderEmptyState());
    return;
  }

  board.appendChild(renderCover());
  board.appendChild(renderTOC());

  const filtered = getFilteredProducts();
  const grouped = groupByCategory(filtered);

  const body = document.createElement('div');
  body.className = 'board-body';

  let hasVisible = false;
  grouped.forEach((products, category) => {
    if (products.length > 0) { hasVisible = true; body.appendChild(renderCategorySection(category, products)); }
  });

  if (!hasVisible) {
    const msg = document.createElement('div');
    msg.style.cssText = 'padding:60px 0;text-align:center;font-size:13px;color:var(--accent)';
    msg.textContent = 'No products match the current filters.';
    body.appendChild(msg);
  }

  board.appendChild(body);
  board.appendChild(renderBoardFooter());
}

function renderEmptyState() {
  const div = document.createElement('div');
  div.id = 'empty-state';
  const h = document.createElement('h2'); h.className = 'empty-heading'; h.textContent = 'Your moodboard begins here.';
  const p = document.createElement('p'); p.className = 'empty-body'; p.textContent = 'Upload a JSON file from the sidebar to populate the board.';
  div.appendChild(h); div.appendChild(p);
  return div;
}

function renderCover() {
  const cover = document.createElement('div');
  cover.className = 'board-cover';

  if (state.headerImageSrc) {
    const img = document.createElement('img');
    img.className = 'board-cover-image';
    img.src = state.headerImageSrc;
    img.alt = '';
    cover.appendChild(img);
  }

  const filtered = getFilteredProducts();
  const grouped = groupByCategory(filtered);

  const inner = document.createElement('div');
  inner.className = 'board-cover-inner';

  const eyebrow = document.createElement('div');
  eyebrow.className = 'cover-eyebrow'; eyebrow.id = 'cover-eyebrow';
  eyebrow.textContent = state.meta.subtitle || 'Curated Selection';
  inner.appendChild(eyebrow);

  const title = document.createElement('h1');
  title.className = 'cover-title'; title.id = 'cover-title';
  title.textContent = state.meta.title || 'Furniture Moodboard';
  inner.appendChild(title);

  const divider = document.createElement('div');
  divider.className = 'cover-divider';
  inner.appendChild(divider);

  const meta = document.createElement('div');
  meta.className = 'cover-meta'; meta.id = 'cover-meta';
  const metaParts = [];
  if (state.meta.date) metaParts.push(state.meta.date);
  metaParts.push(state.products.length + ' Products\u00a0\u00b7\u00a0' + grouped.size + ' Categories');
  if (state.meta.client) metaParts.push(state.meta.client);
  meta.innerHTML = metaParts.join('<br>');
  inner.appendChild(meta);

  cover.appendChild(inner);
  return cover;
}

function renderTOC() {
  const filtered = getFilteredProducts();
  const grouped = groupByCategory(filtered);

  const toc = document.createElement('div');
  toc.className = 'board-toc';

  const heading = document.createElement('h2');
  heading.className = 'toc-heading';
  heading.textContent = 'Contents';
  toc.appendChild(heading);

  const table = document.createElement('table');
  table.className = 'toc-table';
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>Category</th><th>Items</th></tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  grouped.forEach((products, category) => {
    const tr = document.createElement('tr');
    tr.className = 'toc-row';
    const tdCat = document.createElement('td'); tdCat.textContent = category;
    const tdCount = document.createElement('td'); tdCount.className = 'toc-count'; tdCount.textContent = products.length;
    tr.appendChild(tdCat); tr.appendChild(tdCount);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  toc.appendChild(table);
  return toc;
}

function renderCategorySection(categoryName, products) {
  const section = document.createElement('div');
  section.className = 'category-section';

  const heading = document.createElement('div');
  heading.className = 'category-heading';

  const h2 = document.createElement('h2');
  h2.textContent = categoryName;
  heading.appendChild(h2);

  const count = document.createElement('div');
  count.className = 'category-count';
  count.textContent = products.length + (products.length === 1 ? ' item' : ' items');
  heading.appendChild(count);

  const rule = document.createElement('hr');
  rule.className = 'category-rule';
  heading.appendChild(rule);

  section.appendChild(heading);

  const grid = document.createElement('div');
  grid.className = 'card-grid layout-' + state.layout;
  products.forEach(p => grid.appendChild(renderProductCard(p)));
  section.appendChild(grid);

  return section;
}

function renderProductCard(product) {
  const card = document.createElement('div');
  card.className = 'product-card';

  // Image
  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-image-wrap';
  const img = document.createElement('img');
  img.crossOrigin = 'anonymous'; // must precede src; needed for canvas export
  img.alt = String(product.name || '');
  img.onerror = () => {
    // CORS blocked — retry without crossOrigin so the image at least displays
    // (canvas export will be tainted for this image, but that's acceptable)
    img.removeAttribute('crossorigin');
    img.onerror = () => {
      if (imgWrap.contains(img)) imgWrap.removeChild(img);
      const ph = document.createElement('div');
      ph.className = 'image-placeholder'; ph.textContent = 'Image unavailable';
      imgWrap.appendChild(ph);
    };
    img.src = String(product.image_url || '');
  };
  img.src = String(product.image_url || '');
  imgWrap.appendChild(img);
  card.appendChild(imgWrap);

  // Title block — split "Name · Designer" if present
  const { name, designer } = parseName(product.name);
  const titleBlock = document.createElement('div');
  titleBlock.className = 'card-title-block';
  const nameEl = document.createElement('div');
  nameEl.className = 'card-name'; nameEl.textContent = name;
  titleBlock.appendChild(nameEl);
  if (designer) {
    const designerEl = document.createElement('div');
    designerEl.className = 'card-designer'; designerEl.textContent = designer;
    titleBlock.appendChild(designerEl);
  }
  card.appendChild(titleBlock);

  // Spec sheet
  const spec = document.createElement('div');
  spec.className = 'spec-sheet';

  spec.appendChild(makeSpecRow('Category', product.category || ''));
  if (product.tier) spec.appendChild(makeSpecRow('Tier', product.tier));
  if (product.dimensions) spec.appendChild(makeSpecRow('Dimensions', product.dimensions));
  if (product.materials) spec.appendChild(makeSpecRow('Materials', product.materials));
  if (product.finishes) spec.appendChild(makeSpecRow('Finishes', product.finishes));
  if (product.notes) spec.appendChild(makeSpecRow('Notes', product.notes));

  if (product.url) {
    const row = document.createElement('div');
    row.className = 'spec-row';
    const lbl = document.createElement('div'); lbl.className = 'spec-label'; lbl.textContent = 'Link';
    const val = document.createElement('div'); val.className = 'spec-value';
    const a = document.createElement('a');
    a.href = String(product.url); a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.className = 'spec-link'; a.textContent = 'View product \u2192';
    val.appendChild(a); row.appendChild(lbl); row.appendChild(val);
    spec.appendChild(row);
  }

  card.appendChild(spec);
  return card;
}

function renderBoardFooter() {
  const footer = document.createElement('div');
  footer.className = 'board-footer';

  const brand = document.createElement('span');
  brand.className = 'footer-brand';
  brand.textContent = state.meta.client || 'Moodboard Studio';
  footer.appendChild(brand);

  const rule = document.createElement('hr');
  rule.className = 'footer-rule';
  footer.appendChild(rule);

  const date = document.createElement('span');
  date.className = 'footer-date'; date.id = 'board-footer-date';
  date.textContent = state.meta.date;
  footer.appendChild(date);

  return footer;
}

// Lightweight meta update — avoids reloading product images on every keypress
function renderBoardMeta() {
  const coverTitleEl   = document.getElementById('cover-title');
  const coverEyebrowEl = document.getElementById('cover-eyebrow');
  const coverMetaEl    = document.getElementById('cover-meta');
  const dateEl         = document.getElementById('board-footer-date');
  const brandEl        = document.querySelector('.footer-brand');

  if (coverTitleEl)   coverTitleEl.textContent   = state.meta.title || 'Furniture Moodboard';
  if (coverEyebrowEl) coverEyebrowEl.textContent = state.meta.subtitle || 'Curated Selection';
  if (coverMetaEl) {
    const grouped = groupByCategory(getFilteredProducts());
    const parts = [];
    if (state.meta.date) parts.push(state.meta.date);
    parts.push(state.products.length + ' Products\u00a0\u00b7\u00a0' + grouped.size + ' Categories');
    if (state.meta.client) parts.push(state.meta.client);
    coverMetaEl.innerHTML = parts.join('<br>');
  }
  if (dateEl)  dateEl.textContent  = state.meta.date;
  if (brandEl) brandEl.textContent = state.meta.client || 'Moodboard Studio';
}

function applyLayout() {
  document.querySelectorAll('.card-grid').forEach(grid => { grid.className = 'card-grid layout-' + state.layout; });
}

// ============================================================
// FILTERING & GROUPING
// ============================================================
function getFilteredProducts() {
  return state.products.filter(p => state.visibleCategories.has(p.category) && state.visibleTiers.has(p.tier));
}

function groupByCategory(products) {
  const map = new Map();
  products.forEach(p => { if (!map.has(p.category)) map.set(p.category, []); map.get(p.category).push(p); });
  return map;
}

// ============================================================
// UTILITIES
// ============================================================
function parseName(rawName) {
  const str = String(rawName || '');
  const idx = str.indexOf(' \u00b7 '); // ' · '
  if (idx === -1) return { name: str, designer: '' };
  return { name: str.slice(0, idx).trim(), designer: str.slice(idx + 3).trim() };
}

function makeSpecRow(label, value) {
  const row = document.createElement('div'); row.className = 'spec-row';
  const lEl = document.createElement('div'); lEl.className = 'spec-label'; lEl.textContent = label;
  const vEl = document.createElement('div'); vEl.className = 'spec-value'; vEl.textContent = value;
  row.appendChild(lEl); row.appendChild(vEl);
  return row;
}

function getUnique(arr, key) {
  return [...new Set(arr.map(item => item[key]).filter(v => v != null))];
}

function setExportEnabled(enabled) {
  document.getElementById('btn-export-png').disabled = !enabled;
  document.getElementById('btn-export-pdf').disabled = !enabled;
}

function showOverlay(show) {
  document.getElementById('export-overlay').style.display = show ? '' : 'none';
}

function getBoardBg() {
  return getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#1a1a18';
}

// ============================================================
// EXPORT
// ============================================================
const EXPORT_SCALE = 3;
const MAX_CANVAS_DIM = 16383; // safe upper limit across all browsers
const EXPORT_ERR_MSG = 'Export failed. Some images may be blocked by CORS.';

function html2canvasOpts(bg, extra) {
  return Object.assign({
    useCORS: true, allowTaint: true,
    backgroundColor: bg,
    logging: false,
    ignoreElements: el => el.id === 'export-overlay'
  }, extra);
}

function exportPNG() {
  showOverlay(true);
  const board = document.getElementById('board');
  const scale = Math.max(1, Math.min(EXPORT_SCALE, Math.floor(MAX_CANVAS_DIM / board.scrollHeight)));
  html2canvas(board, html2canvasOpts(getBoardBg(), { scale }))
    .then(canvas => {
      const a = document.createElement('a');
      a.download = 'moodboard.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    })
    .catch(err => { console.error('PNG export failed:', err); alert(EXPORT_ERR_MSG); })
    .finally(() => showOverlay(false));
}

async function exportPDF() {
  showOverlay(true);
  try {
    const board  = document.getElementById('board');
    const boardW = board.offsetWidth;
    const boardH = board.scrollHeight;
    const bg     = getBoardBg(); // resolved once; getComputedStyle is expensive in a loop

    const { jsPDF } = window.jspdf;
    const A4_W = 210; // mm — portrait
    const A4_H = 297; // mm

    const mmPerPx      = A4_W / boardW;
    const pageHeightPx = Math.round(A4_H / mmPerPx);
    const totalPages   = Math.ceil(boardH / pageHeightPx);

    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    for (let i = 0; i < totalPages; i++) {
      if (i > 0) pdf.addPage();

      const srcY  = i * pageHeightPx;
      const srcH  = Math.min(pageHeightPx, boardH - srcY);
      const destH = srcH * mmPerPx;

      const canvas = await html2canvas(board, html2canvasOpts(bg, {
        scale: EXPORT_SCALE,
        y: srcY, height: srcH
      }));

      pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, A4_W, destH);
      canvas.width = 0; // release GPU memory before next tile
    }

    pdf.save('moodboard.pdf');
  } catch(err) {
    console.error('PDF export failed:', err);
    alert('Export failed. Some images may be blocked by CORS.');
  } finally {
    showOverlay(false);
  }
}

// ============================================================
// START
// ============================================================
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
